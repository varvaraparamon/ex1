{% extends "base.html" %}
{% block content %}
  {% if validlink %}
    <h2>Придумайте новый пароль 🔒</h2>
    <form method="post" style="max-width:400px;">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit"
              style="background:#ff1493;color:white;padding:8px 16px;border:none;border-radius:5px;cursor:pointer;">
        Сохранить новый пароль
      </button>
    </form>
  {% else %}
    <h2>Ссылка недействительна</h2>
    <p>Ссылка для сброса пароля устарела или уже была использована.</p>
    <p><a href="{% url 'users:password_reset' %}">Запросить новую ссылку</a></p>
  {% endif %}
{% endblock %}
