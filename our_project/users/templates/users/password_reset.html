{% extends "base.html" %}
{% block content %}
  <h2 style="color:#ff1493;">Забыли пароль? 💔</h2>
  <p>Введите email, к которому привязан ваш аккаунт PinkStore. Мы отправим ссылку для сброса пароля.</p>


  <form method="post" style="max-width:400px;">
    {% csrf_token %}
    {{ form.as_p }}


    <button type="submit"
            style="background:#ff1493;color:white;padding:8px 16px;border:none;border-radius:5px;cursor:pointer;">
      Отправить ссылку
    </button>
  </form>
{% endblock %}
