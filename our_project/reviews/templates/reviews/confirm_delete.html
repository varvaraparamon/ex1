{% extends 'base.html' %}
{% block content %}
    <div style="max-width: 600px; margin: 0 auto; text-align: center; background: #fff0f5; padding: 30px; border-radius: 10px; border: 2px dashed #ff69b4;">
        <h2 style="color: #d1005a; margin-top: 0;">⚠️ Подтверждение удаления</h2>
        
        <p style="font-size: 16px;">Вы действительно хотите безвозвратно удалить свой отзыв на товар <strong>"{{ review.product.title }}"</strong>?</p>
        
        <div style="background: white; padding: 15px; border-radius: 5px; margin: 20px 0; text-align: left; font-style: italic; color: #555;">
            "{{ review.text }}"
        </div>


        <form method="post">
            {% csrf_token %}
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <!-- Кнопка отмены просто возвращает назад через GET -->
                <a href="{% url 'catalog:product_detail' review.product.id %}" style="padding: 10px 20px; background: white; color: #ff1493; text-decoration: none; border: 1px solid #ffb6c1; border-radius: 5px; font-weight: bold;">
                    Нет, передумала 🌸
                </a>


                <!-- Кнопка удаления отправляет POST-запрос, который физически удалит запись в БД -->
                <button type="submit" style="background: #d1005a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Да, удалить 🗑️
                </button>
            </div>
        </form>
    </div>
{% endblock %}
