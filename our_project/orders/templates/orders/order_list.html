{% extends 'base.html' %}
{% block content %}
    <h2 style="color: #ff1493;">📦 Мои заказы</h2>
    <table style="width: 100%; border-collapse: collapse;">
        <tr style="background: #ffebf2;">
            <th style="padding: 10px; border: 1px solid #ffb6c1;">ID заказа</th>
            <th style="padding: 10px; border: 1px solid #ffb6c1;">Дата</th>
            <th style="padding: 10px; border: 1px solid #ffb6c1;">Статус оплаты</th>
        </tr>
        {% for order in orders %}
        <tr>
            <td style="padding: 10px; border: 1px solid #ffb6c1;">#{{ order.id }}</td>
            <td style="padding: 10px; border: 1px solid #ffb6c1;">{{ order.created_at|date:"d.m.Y H:i" }}</td>
            <td style="padding: 10px; border: 1px solid #ffb6c1;">
                {% if order.is_paid %} ✅ Оплачен {% else %} ❌ Ожидает оплаты {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
